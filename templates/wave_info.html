<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ date }} 鎌倉波情報</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="p-4 md:p-10 bg-slate-50">
    <div class="max-w-5xl mx-auto">

        <div class="flex justify-between items-center mb-2">
            <a href="/" class="text-blue-500 hover:underline font-bold text-sm">← 戻る</a>
            <div class="bg-white p-1 rounded-xl shadow-sm border border-slate-200 flex gap-1">
                <button onclick="changeLevel('beginner')" id="btn-beginner"
                    class="px-4 py-1 rounded-md text-xs font-bold transition-all bg-blue-600 text-white">初心者</button>
                <button onclick="changeLevel('experienced')" id="btn-experienced"
                    class="px-4 py-1 rounded-md text-xs font-bold transition-all text-slate-400 hover:bg-slate-50">経験者</button>
            </div>
        </div>

        <header class="mb-4 mt-2 flex justify-between items-center">
            <h1 class="text-2xl md:text-3xl font-extrabold text-slate-800">{{ date }}</h1>
            <div
                class="bg-blue-100 text-blue-800 px-4 py-1 rounded-full text-sm font-bold shadow-sm border border-blue-200">
                潮回り：{{ tide_phase }}
            </div>
        </header>

        <div
            class="bg-slate-800 text-white p-5 md:p-6 rounded-t-3xl shadow-2xl flex flex-col md:flex-row justify-between items-center border-b border-slate-700 gap-4">
            <div class="w-full md:w-auto text-center md:text-left md:border-r border-slate-600 md:pr-6">
                <p class="text-xs text-slate-400 mb-1">選択中の時刻</p>
                <p id="display-time" class="text-3xl font-black text-white tracking-widest">--:--</p>
            </div>

            <div class="w-full md:w-auto text-center md:border-r border-slate-600 md:px-6">
                <p class="text-xs text-slate-400 mb-1">総合スコア</p>
                <div class="relative inline-block">
                    <span id="display-score"
                        class="text-5xl md:text-6xl font-black text-yellow-400 tracking-tighter">--</span>
                    <span class="text-sm font-bold text-slate-500 absolute bottom-1 -right-8">/100</span>
                </div>
                <p id="display-advice" class="mt-2 text-[10px] md:text-xs font-bold text-slate-300">--</p>
            </div>

            <div class="flex-1 text-center w-full">
                <div class="flex items-baseline justify-center">
                    <span class="text-sm text-slate-400 mr-3">風速</span>
                    <span id="display-wind-speed"
                        class="text-6xl md:text-7xl font-black tracking-tighter text-white">--</span>
                    <span class="text-xl ml-1 text-slate-300">m/s</span>
                </div>
                <div class="flex items-center justify-center mt-2 gap-3">
                    <span class="text-sm text-slate-400">風向</span>
                    <div id="display-wind-cardinal" class="text-2xl font-bold text-slate-100 tracking-widest">--</div>
                    <div id="display-wind-condition"
                        class="inline-block text-xs font-bold px-3 py-1 rounded bg-slate-600 text-slate-200">--</div>
                </div>
            </div>

            <div
                class="flex w-full md:w-auto justify-center gap-6 md:border-l border-slate-600 md:pl-6 pt-4 md:pt-0 border-t md:border-t-0 border-slate-600">
                <div class="text-center">
                    <p class="text-xs text-slate-400 mb-1">波高</p>
                    <div class="flex items-baseline justify-center">
                        <span id="display-wave-height" class="text-4xl font-bold text-cyan-400">--</span>
                        <span class="text-sm ml-1 text-slate-400">m</span>
                    </div>
                    <div id="display-wave-size"
                        class="mt-1 text-[10px] font-bold text-cyan-200 bg-slate-700 px-2 py-0.5 rounded inline-block tracking-wider">
                        --</div>
                </div>
                <div class="text-center">
                    <p class="text-xs text-slate-400 mb-1">潮位</p>
                    <div class="flex items-baseline justify-center">
                        <span id="display-tide" class="text-4xl font-bold text-orange-400">--</span>
                        <span class="text-sm ml-1 text-slate-400">cm</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="chart-container rounded-b-3xl bg-white shadow-2xl p-4 md:p-6" style="height:45vh; width:100%">
            <canvas id="waveChart"></canvas>
        </div>

        <hr style="margin-top: 40px;">
        <h3 class="font-bold text-slate-800 text-xl">🏄‍♂️ 今日のサーフィンを記録する（AI学習用）</h3>
        <div
            style="background: #f8f9fa; padding: 20px; border-radius: 8px; border-left: 5px solid #ff9800; margin-bottom: 40px; margin-top: 10px;">

            <label style="font-weight: bold;">① 記録者:</label><br>
            <select id="log_user_name" onchange="updateLogDropdown()"
                style="padding: 8px; margin-top: 5px; margin-bottom: 15px; width: 100%; max-width: 400px; border: 1px solid #ccc; border-radius: 4px;">
                <option value="Beginner">ビギナー（初心者）</option>
                <option value="Pro">経験者（Pro）</option>
            </select>
            <br>

            <label style="font-weight: bold;">② 入水した時間帯:</label><br>
            <select id="log_hour"
                style="padding: 8px; margin-top: 5px; margin-bottom: 15px; width: 100%; max-width: 400px; border: 1px solid #ccc; border-radius: 4px;">
                {% for i in range(time_data|length) %}
                <option value="{{ i }}">{{ time_data[i] }} (波: {{ wave_data[i] }}m / 予報スコア: {{ experienced_scores[i]
                    }}点)</option>
                {% endfor %}
            </select>
            <br>

            <label style="font-weight: bold;">③ あなたの体感スコア (0〜100):</label><br>
            <input type="number" id="log_user_score" min="0" max="100" placeholder="例: 85"
                style="padding: 8px; margin-top: 5px; margin-bottom: 15px; width: 100px; border: 1px solid #ccc; border-radius: 4px;">
            <br>

            <label style="font-weight: bold;">④ メモ (任意):</label><br>
            <input type="text" id="log_comment" placeholder="例: サイズ以上のパワーがあった。少しカレントあり"
                style="padding: 8px; margin-top: 5px; margin-bottom: 15px; width: 100%; max-width: 400px; border: 1px solid #ccc; border-radius: 4px;">
            <br>

            <button onclick="saveLog()"
                style="background: #ff9800; color: white; padding: 12px 24px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; max-width: 400px;">
                データをSupabaseに保存する
            </button>
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/chart_script.js') }}"></script>
    <script>
        const timeData = {{ time_data | tojson }};
        const waveData = {{ wave_data | tojson }};
        const windSpeedData = {{ wind_speed_data | tojson }};
        const windConditionData = {{ wind_condition_data | tojson }};
        const windCardinalData = {{ wind_cardinal_data | tojson }};
        const tideData = {{ tide_data | tojson }};
        const beginnerScores = {{ beginner_scores | tojson }};
        const experiencedScores = {{ experienced_scores | tojson }};
        const waveSizeData = {{ wave_size_data | tojson }};

        renderWaveChart(timeData, waveData, windSpeedData, windConditionData, windCardinalData, tideData, beginnerScores, experiencedScores, waveSizeData);
    </script>

    <script>
        const log_waveData = {{ wave_data | tojson }};
        const log_windSpeedData = {{ wind_speed_data | tojson }};
        const log_windDegData = {{ wind_deg_data | tojson }};
        const log_tideData = {{ tide_data | tojson }};
        const log_timeData = {{ time_data | tojson }};
        const log_dateStr = "{{ date }}";

        // ★追加：ビギナーと経験者、両方のスコアを読み込んでおく
        const log_beginnerScores = {{ beginner_scores | tojson }};
        const log_experiencedScores = {{ experienced_scores | tojson }};

        // ★新機能：記録者が切り替わった時に、時間帯プルダウンの文字を更新する関数
        function updateLogDropdown() {
            const userName = document.getElementById('log_user_name').value;
            const hourSelect = document.getElementById('log_hour');

            // プルダウンの選択肢（0時〜21時）をループして書き換える
            for (let i = 0; i < hourSelect.options.length; i++) {
                const time = log_timeData[i];
                const wave = log_waveData[i].toFixed(2); // 小数点2桁
                // 選ばれている名前に合わせてスコアを切り替える
                const score = (userName === 'Beginner') ? log_beginnerScores[i] : log_experiencedScores[i];

                // プルダウンの文字を動的に書き換え！
                hourSelect.options[i].text = `${time} (波: ${wave}m / 予報スコア: ${score}点)`;
            }
        }

        // ★ページが開かれた瞬間に1回実行して、初期状態（ビギナー）の文字にしておく
        window.addEventListener('DOMContentLoaded', updateLogDropdown);


        function saveLog() {
            const userName = document.getElementById('log_user_name').value;
            const index = document.getElementById('log_hour').value;
            const userScore = document.getElementById('log_user_score').value;
            const comment = document.getElementById('log_comment').value;

            if (!userScore) {
                alert("体感スコアを入力してください！");
                return;
            }

            const deg = log_windDegData[index] || 0;
            const windSin = Math.sin(deg * (Math.PI / 180));
            const windCos = Math.cos(deg * (Math.PI / 180));

            // ★修正：選ばれている名前に合わせて、データベースに保存する予報スコアも切り替える！
            const logicScoreToSave = (userName === 'Beginner') ? log_beginnerScores[index] : log_experiencedScores[index];

            const payload = {
                user_name: userName,
                date: log_dateStr,
                hour: log_timeData[index],
                wave_h: log_waveData[index],
                wind_speed: log_windSpeedData[index],
                wind_sin: windSin,
                wind_cos: windCos,
                tide_h: log_tideData[index],
                logic_score: logicScoreToSave, // ここが正しいスコアになる！
                user_score: parseInt(userScore),
                comment: comment
            };

            fetch('/save_log', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === "success") {
                        alert("保存成功！Supabaseの画面で確認してみてね！");
                        document.getElementById('log_user_score').value = '';
                        document.getElementById('log_comment').value = '';
                    } else {
                        alert("エラーが発生しました: " + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert("通信エラーが発生しました。");
                });
        }
    </script>
</body>

</html>
