<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ date }} の波の高さ情報</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        <a href="/" class="back-link">← 戻る</a>

        <header class="mb-6">
            <h1 class="text-2xl md:text-3xl font-bold">{{ date }} の波高予測</h1>
            <p class="text-blue-500">Surf Spot: Kamakura Area</p>
        </header>

        <div class="chart-container" style="position: relative; height:40vh; width:100%">
            <canvas id="waveChart"></canvas>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/chart_script.js') }}"></script>

    <script>
        // Pythonから渡されたデータをJS変数に代入
        // この部分はHTML内に書く必要があります（Jinja2が解釈するため）
        const timeData = {{ time_data | tojson }};
        const waveData = {{ wave_data | tojson }};

        // 外部ファイル(chart_script.js)の関数を呼び出す
        renderWaveChart(timeData, waveData);
    </script>
</body>

</html>
