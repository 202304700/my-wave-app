<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ date }} の波・風情報</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        <a href="/" class="back-link text-blue-500 hover:underline font-bold">← 戻る</a>

        <header class="mb-4 mt-4">
            <h1 class="text-2xl md:text-3xl font-bold text-blue-900">{{ date }} の波高・風予測</h1>
            <p class="text-blue-500 text-sm mt-1">Surf Spot: Kamakura Area</p>
        </header>

        <div class="bg-gray-800 text-white p-5 rounded-t-2xl shadow-lg mt-4 flex justify-between items-center">
            <div>
                <p class="text-sm text-gray-400 mb-1">選択中の時刻: <span id="display-time"
                        class="font-bold text-white text-xl ml-2">--:--</span></p>
                <div class="flex items-baseline mt-2">
                    <span class="text-xs text-gray-400 mr-3">風速</span>
                    <span id="display-wind-speed" class="text-5xl font-bold tracking-tight">--</span>
                    <span class="text-lg ml-1 text-gray-300">m/s</span>
                </div>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-400 mb-1">風向</div>
                <div id="display-wind-cardinal" class="text-3xl font-bold tracking-widest mb-2">--</div>
                <div id="display-wind-condition"
                    class="inline-block text-sm font-bold px-3 py-1 rounded bg-gray-700 text-gray-300">--</div>
            </div>
        </div>

        <div class="chart-container rounded-b-2xl rounded-t-none mt-0 bg-white shadow-lg p-4"
            style="position: relative; height:40vh; width:100%">
            <canvas id="waveChart"></canvas>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/chart_script.js') }}"></script>

    <script>
        // Pythonから渡されたデータをJS変数に代入
        const timeData = {{ time_data | tojson }};
        const waveData = {{ wave_data | tojson }};
        const windSpeedData = {{ wind_speed_data | tojson }};
        const windConditionData = {{ wind_condition_data | tojson }};
        const windCardinalData = {{ wind_cardinal_data | tojson }};

        // 外部ファイル(chart_script.js)の関数を呼び出す
        renderWaveChart(timeData, waveData, windSpeedData, windConditionData, windCardinalData);
    </script>
</body>

</html>
